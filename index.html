<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stellar Budget</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --needs: #10b981;
            --wants: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body.dark-mode {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            transition: all 0.3s ease;
        }

        .container { 
            width: 100%; 
            max-width: 420px; 
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h2 { margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }

        .dark-mode-toggle {
            background: none; border: 1px solid #ddd; width: auto; padding: 8px 12px;
            color: var(--text); border-radius: 12px; cursor: pointer;
        }

        /* Budget Cards */
        .budget-card {
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 16px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .needs-box { background: linear-gradient(135deg, #10b981, #059669); }
        .wants-box { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .card-label { font-size: 0.85rem; font-weight: 600; opacity: 0.9; margin-bottom: 4px; }
        .amount { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
        
        .progress-container {
            background: rgba(255, 255, 255, 0.2);
            height: 8px;
            border-radius: 10px;
        }
        .progress-bar {
            height: 100%;
            background: white;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* Form */
        .input-group { background: var(--bg); padding: 16px; border-radius: 16px; margin-bottom: 20px; }
        
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; color: #64748b; }
        
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid transparent;
            border-radius: 12px; font-family: inherit; font-size: 1rem;
            background: var(--card); color: var(--text); box-sizing: border-box;
        }

        button.main-btn {
            background: var(--primary); color: white; border: none; padding: 16px;
            border-radius: 12px; width: 100%; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: transform 0.1s;
        }
        button.main-btn:active { transform: scale(0.98); }

        /* History */
        .history { margin-top: 24px; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        .history-item {
            display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9;
        }
        .icon-circle {
            width: 36px; height: 36px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; margin-right: 12px;
        }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 0.9rem; }
        .item-cat { font-size: 0.7rem; color: #64748b; }
        .item-amt { font-weight: 700; color: #ef4444; }

        /* Settings Toggle */
        .settings-btn {
            background: none; border: none; color: #64748b; font-size: 0.8rem;
            margin-top: 20px; cursor: pointer; text-decoration: underline; width: 100%;
        }
        #settings-area { display: none; padding-top: 15px; }

        .footer-btns { display: flex; gap: 10px; margin-top: 20px; }
        .sec-btn { background: #94a3b8; font-size: 0.75rem; padding: 10px; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fa-solid fa-wallet" style="color: var(--primary)"></i> Stellar Wallet</h2>
        <button class="dark-mode-toggle" onclick="toggleDark()"><i class="fa-solid fa-moon"></i></button>
    </div>

    <!-- Cards -->
    <div class="budget-card needs-box">
        <div class="card-label">Daily Needs Left</div>
        <div class="amount" id="needsDisplay">₹0</div>
        <div class="progress-container">
            <div class="progress-bar" id="needsProgress" style="width: 100%"></div>
        </div>
    </div>

    <div class="budget-card wants-box">
        <div class="card-label">Wants Left</div>
        <div class="amount" id="wantsDisplay">₹0</div>
        <div class="progress-container">
            <div class="progress-bar" id="wantsProgress" style="width: 100%"></div>
        </div>
    </div>

    <!-- Inputs -->
    <div class="input-group">
        <label>New Transaction</label>
        <input type="text" id="desc" placeholder="What was it for? (e.g. Coffee)">
        <input type="number" id="amt" placeholder="Amount (₹)" inputmode="decimal">
        <select id="cat">
            <option value="needs">Daily Need</option>
            <option value="wants">Want / Lifestyle</option>
        </select>
        <button class="main-btn" onclick="addEntry()">Add Expense</button>
    </div>

    <!-- History -->
    <div class="history" id="historyList">
        <label>Recent Transactions</label>
    </div>

    <button class="settings-btn" onclick="toggleSettings()">⚙️ Adjust Limits or Reset</button>
    
    <div id="settings-area">
        <label>Set Monthly Targets</label>
        <input type="number" id="setNeeds" placeholder="Set Needs Limit (e.g. 6000)">
        <input type="number" id="setWants" placeholder="Set Wants Limit (e.g. 7150)">
        <div class="footer-btns">
            <button class="main-btn" style="background: #334155" onclick="setNewLimits()">Update</button>
            <button class="main-btn sec-btn" onclick="clearAll()">Reset Month</button>
        </div>
    </div>
</div>

<script>
    let needsLimit = parseFloat(localStorage.getItem('needsLimit')) || 6000;
    let wantsLimit = parseFloat(localStorage.getItem('wantsLimit')) || 7150;
    let needs = parseFloat(localStorage.getItem('needs')) ?? needsLimit;
    let wants = parseFloat(localStorage.getItem('wants')) ?? wantsLimit;
    let history = JSON.parse(localStorage.getItem('history')) || [];

    function update() {
        document.getElementById('needsDisplay').innerText = '₹' + Math.max(0, needs).toLocaleString();
        document.getElementById('wantsDisplay').innerText = '₹' + Math.max(0, wants).toLocaleString();
        
        // Update Progress Bars
        document.getElementById('needsProgress').style.width = (Math.max(0, needs) / needsLimit * 100) + '%';
        document.getElementById('wantsProgress').style.width = (Math.max(0, wants) / wantsLimit * 100) + '%';

        localStorage.setItem('needs', needs);
        localStorage.setItem('wants', wants);
        localStorage.setItem('history', JSON.stringify(history));
        
        const list = document.getElementById('historyList');
        list.innerHTML = '<label>Recent Transactions</label>';
        history.slice().reverse().forEach(item => {
            const icon = item.cat === 'needs' ? 'fa-cart-shopping' : 'fa-star';
            const color = item.cat === 'needs' ? '#10b981' : '#f59e0b';
            list.innerHTML += `
                <div class="history-item">
                    <div class="icon-circle" style="background: ${color}20; color: ${color}">
                        <i class="fa-solid ${icon}"></i>
                    </div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-cat">${item.cat.toUpperCase()}</div>
                    </div>
                    <div class="item-amt">-₹${item.val}</div>
                </div>`;
        });
    }

    function addEntry() {
        const name = document.getElementById('desc').value || "Expense";
        const val = parseFloat(document.getElementById('amt').value);
        const cat = document.getElementById('cat').value;
        if (isNaN(val) || val <= 0) return;
        if (cat === 'needs') { needs -= val; } else { wants -= val; }
        history.push({name, val, cat});
        if (history.length > 5) history.shift();
        document.getElementById('desc').value = '';
        document.getElementById('amt').value = '';
        update();
    }

    function setNewLimits() {
        const nLimit = parseFloat(document.getElementById('setNeeds').value);
        const wLimit = parseFloat(document.getElementById('setWants').value);
        if (!isNaN(nLimit)) { needsLimit = nLimit; needs = nLimit; localStorage.setItem('needsLimit', nLimit); }
        if (!isNaN(wLimit)) { wantsLimit = wLimit; wants = wLimit; localStorage.setItem('wantsLimit', wLimit); }
        update();
        toggleSettings();
    }

    function clearAll() {
        if(confirm("Start new month?")) {
            needs = needsLimit; wants = wantsLimit; history = [];
            update();
        }
    }

    function toggleSettings() {
        const area = document.getElementById('settings-area');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }

    function toggleDark() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark', document.body.classList.contains('dark-mode'));
    }

    if(localStorage.getItem('dark') === 'true') document.body.classList.add('dark-mode');
    update();
</script>

</body>
</html>
