<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Frost</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>

    <style>
        :root {
            --cream: #faf6f0;
            --warm-bg: #f2ece3;
            --card-bg: rgba(250,246,240,0.85);
            --card-border: rgba(200,175,145,0.35);
            --text: #2c1f0e;
            --sub: #7a6550;
            --accent: #c2622f;
            --accent2: #4a7c5f;
            --surface: rgba(255,248,240,0.6);
            --stroke: rgba(180,150,110,0.3);
            --danger: #c0392b;
        }
        body.dark {
            --cream: #1a1208;
            --warm-bg: #120e07;
            --card-bg: rgba(30,22,12,0.9);
            --card-border: rgba(180,140,90,0.2);
            --text: #f5edde;
            --sub: #9e8b72;
            --accent: #e07840;
            --accent2: #6aaf88;
            --surface: rgba(40,30,18,0.7);
            --stroke: rgba(160,130,80,0.2);
            --danger: #e05050;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px 16px 80px;
            color: var(--text);
            background: var(--warm-bg);
            transition: background 0.4s, color 0.4s;
        }

        .container {
            width: 100%; max-width: 420px;
            background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px; padding: 24px;
            box-shadow: 0 20px 50px -12px rgba(0,0,0,0.15);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-icon {
            width: 38px; height: 38px; border-radius: 12px;
            background: linear-gradient(145deg, var(--accent), #a04820);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.9rem;
        }
        h2 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }

        .btn-row { display: flex; gap: 8px; }
        .mode-btn {
            background: var(--surface); border: 1px solid var(--stroke);
            padding: 8px 12px; color: var(--sub); border-radius: 12px;
            cursor: pointer; font-weight: 700; transition: all 0.2s; font-family: inherit; font-size: 0.85rem;
        }
        .mode-btn:hover { color: var(--text); border-color: var(--accent); }
        #sync-btn.connected { color: var(--accent2); border-color: var(--accent2); }
        #sync-btn.syncing   { color: var(--sub); border-style: dashed; cursor: default; }
        #sync-btn.error     { color: var(--danger); border-color: var(--danger); }

        .budget-card {
            padding: 18px 20px; border-radius: 20px; margin-bottom: 12px;
            color: #fff; position: relative; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .card-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.9; }
        .amount { font-size: 2rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
        .progress-track { background: rgba(255,255,255,0.25); height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; transition: width 0.8s ease-out; }

        .input-group {
            background: var(--surface); border-radius: 20px;
            padding: 18px; margin-top: 15px; border: 1px solid var(--stroke);
        }
        .sect-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--sub); margin-bottom: 10px; display: block; }

        input, select {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: 1.5px solid var(--stroke); border-radius: 12px;
            font-family: inherit; font-size: 0.95rem; font-weight: 600;
            background: rgba(255,255,255,0.4); color: var(--text); outline: none;
            -webkit-appearance: none; appearance: none;
        }
        body.dark input, body.dark select { background: rgba(0,0,0,0.2); }
        input:focus, select:focus { border-color: var(--accent); }

        .main-btn {
            background: var(--accent); color: #fff; border: none; padding: 14px;
            border-radius: 14px; width: 100%; font-weight: 800; font-size: 0.95rem;
            cursor: pointer; transition: transform 0.1s; font-family: inherit; margin-bottom: 8px;
        }
        .main-btn:active { transform: scale(0.98); }

        /* History */
        .history {
            margin-top: 20px; border-top: 1px solid var(--stroke);
            padding-top: 15px; max-height: 260px; overflow-y: auto; padding-right: 4px;
        }
        .history::-webkit-scrollbar { width: 4px; }
        .history::-webkit-scrollbar-thumb { background: var(--stroke); border-radius: 10px; }

        .history-item-wrapper {
            position: relative; overflow: hidden; border-radius: 10px; margin-bottom: 2px;
        }
        .delete-bg {
            position: absolute; right: 0; top: 0; bottom: 0; width: 68px;
            background: linear-gradient(135deg,#e05555,#b02020);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1rem; border-radius: 10px;
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        .history-item {
            display: flex; align-items: center; padding: 10px 6px;
            border-bottom: 1px solid var(--stroke); background: transparent;
            transition: transform 0.2s ease, background 0.15s;
            position: relative; touch-action: pan-y; border-radius: 10px;
        }
        .history-item:hover { background: rgba(192,57,43,0.04); }
        .icon-circle { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; font-size: 0.85rem; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 700; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
        .item-meta { font-size: 0.65rem; color: var(--sub); font-weight: 700; display: flex; justify-content: space-between; padding-right: 8px; }
        .item-amt { font-weight: 800; color: var(--danger); font-size: 0.9rem; margin-right: 4px; }
        .delete-btn {
            background: none; border: none; color: var(--danger);
            cursor: pointer; padding: 6px 8px; border-radius: 8px;
            font-size: 0.8rem; opacity: 0; flex-shrink: 0;
            transition: opacity 0.15s, background 0.15s;
        }
        .history-item-wrapper:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: rgba(192,57,43,0.1); }
        @media (hover: none) { .delete-btn { opacity: 0.4; } }

        .history-item-wrapper.removing {
            animation: slideOut 0.28s ease forwards; overflow: hidden;
        }
        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); max-height: 70px; margin-bottom: 2px; }
            to   { opacity: 0; transform: translateX(50px); max-height: 0; margin-bottom: 0; }
        }

        /* Settings */
        #settings-area { display: none; padding-top: 15px; border-top: 1px dashed var(--stroke); margin-top: 10px; }
        .cat-edit-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .cat-edit-row input { margin-bottom: 0; flex: 1; }
        .settings-toggle { background: none; border: none; color: var(--sub); font-size: 0.65rem; font-weight: 800; cursor: pointer; width: 100%; padding: 10px; text-transform: uppercase; font-family: inherit; }
        .del-cat-btn { background: rgba(192,57,43,0.1); color: var(--danger); border: 1px solid rgba(192,57,43,0.2); padding: 10px 13px; border-radius: 10px; cursor: pointer; font-weight: 800; flex-shrink: 0; transition: background 0.2s; }
        .del-cat-btn:hover { background: rgba(192,57,43,0.22); }
        .reset-btn { background: rgba(0,0,0,0.05) !important; color: var(--sub) !important; box-shadow: none !important; border: 1px solid var(--stroke) !important; }
        body.dark .reset-btn { background: rgba(255,255,255,0.05) !important; }

        /* Delete confirmation modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(20,10,0,0.5); backdrop-filter: blur(8px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--cream); border: 1px solid var(--card-border);
            border-radius: 24px; padding: 28px 24px;
            max-width: 320px; width: 92%;
            box-shadow: 0 30px 70px rgba(0,0,0,0.2);
            text-align: center;
            animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn { from { transform: scale(0.82); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-icon { width: 52px; height: 52px; border-radius: 16px; background: rgba(192,57,43,0.1); color: var(--danger); font-size: 1.3rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; border: 1px solid rgba(192,57,43,0.2); }
        .modal-title { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-bottom: 6px; }
        .modal-desc { font-size: 0.78rem; color: var(--sub); margin-bottom: 14px; line-height: 1.6; }
        .modal-preview { background: rgba(192,57,43,0.06); border: 1px solid rgba(192,57,43,0.15); border-radius: 10px; padding: 10px 14px; margin-bottom: 20px; font-size: 0.82rem; font-weight: 700; color: var(--text); }
        .modal-actions { display: flex; gap: 10px; }
        .modal-cancel { flex: 1; padding: 12px; border-radius: 12px; border: 1.5px solid var(--stroke); background: transparent; color: var(--sub); font-weight: 700; font-size: 0.88rem; cursor: pointer; font-family: inherit; transition: all 0.2s; }
        .modal-cancel:hover { border-color: var(--accent); color: var(--text); }
        .modal-confirm { flex: 1; padding: 12px; border-radius: 12px; border: none; background: linear-gradient(135deg,#e05555,#b02020); color: #fff; font-weight: 800; font-size: 0.88rem; cursor: pointer; font-family: inherit; box-shadow: 0 4px 14px rgba(192,57,43,0.3); transition: transform 0.15s; }
        .modal-confirm:active { transform: scale(0.97); }

        .empty-state { font-size: 0.78rem; color: var(--sub); opacity: 0.7; text-align: center; padding: 16px 0; }
        #sync-btn.disconnecting { color: var(--danger); border-color: var(--danger); border-style: dashed; }
        .divider { height: 1px; background: var(--stroke); margin: 14px 0; }
    </style>
</head>
<body>

<!-- Delete Confirmation Modal -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal-box">
        <div class="modal-icon"><i class="fa-solid fa-trash-can"></i></div>
        <div class="modal-title">Delete Transaction?</div>
        <div class="modal-desc">The amount will be restored to the category balance.</div>
        <div class="modal-preview" id="modalPreview">—</div>
        <div class="modal-actions">
            <button class="modal-cancel" onclick="closeDeleteModal()">Cancel</button>
            <button class="modal-confirm" onclick="confirmDelete()"><i class="fa-solid fa-trash-can"></i> Delete</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-wallet"></i></div>
            <h2>Budget Frost</h2>
        </div>
        <div class="btn-row">
            <button id="sync-btn" class="mode-btn" onclick="handleAuthClick()" style="opacity:0.5;"><i class="fa-solid fa-cloud"></i> Sync</button>
            <button id="logout-btn" class="mode-btn" onclick="disconnectDrive()" style="display:none; color:var(--danger); border-color:var(--danger);" title="Disconnect Google Drive"><i class="fa-solid fa-right-from-bracket"></i></button>
            <button class="mode-btn" onclick="toggleDark()"><i class="fa-solid fa-circle-half-stroke"></i></button>
        </div>
    </div>

    <div id="cards-container"></div>

    <div class="input-group">
        <span class="sect-label">Record Expense</span>
        <input type="text" id="desc" placeholder="What did you buy?">
        <input type="number" id="amt" placeholder="Amount (₹)" inputmode="decimal">
        <select id="catSelect"></select>
        <button class="main-btn" onclick="addEntry()">Record Transaction</button>
    </div>

    <div class="history" id="historyList"></div>

    <button class="settings-toggle" onclick="toggleSettings()"><i class="fa-solid fa-sliders"></i> Manage Categories</button>
    <div id="settings-area">
        <span class="sect-label">Edit Limits</span>
        <div id="editList"></div>
        <button class="main-btn" style="background:var(--text);" onclick="saveLimits()">Update Limits</button>
        <div class="divider"></div>
        <span class="sect-label">Add New Category</span>
        <input type="text" id="newCatName" placeholder="Name">
        <input type="number" id="newCatLimit" placeholder="Limit (₹)">
        <button class="main-btn" style="background:var(--accent2);" onclick="addNewCategory()">Create Category</button>
        <div class="divider"></div>
        <button class="main-btn reset-btn" onclick="manualReset()"><i class="fa-solid fa-rotate-left"></i> Force Manual Reset</button>
    </div>
</div>

<script>
    const API_KEY  = 'AIzaSyCbvpwnax8WUt7QYwmSRi_pT86MX6zJgTQ';
    const CLIENT_ID = '321734619089-ei40f8ffhmtqduqv6d9msllhul0r1bvc.apps.googleusercontent.com';
    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
    const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

    const palettes = [
        { grad: ['#c2622f','#8f3d10'], base: '#c2622f', icon: 'fa-cart-shopping' },
        { grad: ['#4a7c5f','#2e5c40'], base: '#4a7c5f', icon: 'fa-star' },
        { grad: ['#8b6914','#6a4e0a'], base: '#c49a25', icon: 'fa-bolt' },
        { grad: ['#7a4a8f','#5a2a70'], base: '#9a6ab0', icon: 'fa-heart' },
        { grad: ['#2a7a8a','#1a5a6a'], base: '#3a9aaa', icon: 'fa-plane' },
    ];

    let categories = JSON.parse(localStorage.getItem('myCats')) || [
        { id: 'needs', name: 'Daily Needs', limit: 6000, balance: 6000, pIndex: 0 },
        { id: 'wants', name: 'Wants', limit: 7150, balance: 7150, pIndex: 1 }
    ];
    let history = JSON.parse(localStorage.getItem('history')) || [];
    let storedMonth = localStorage.getItem('currentMonth');
    let pendingDeleteIndex = null;

    // ── GOOGLE DRIVE SYNC ──
    let gapiInited   = false;
    let gsiInited    = false;
    let driveFileId  = localStorage.getItem('driveFileId') || null;
    let autoSyncTimer = null;
    let isSyncing    = false;

    function setSyncStatus(status, email) {
        // status: 'disconnected' | 'connected' | 'syncing' | 'error'
        const btn = document.getElementById('sync-btn');
        btn.classList.remove('connected','syncing','error');
        if (status === 'disconnected') {
            btn.innerHTML = '<i class="fa-solid fa-cloud"></i> Sync';
            btn.style.opacity = gapiInited && gsiInited ? '1' : '0.5';
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) logoutBtn.style.display = 'none';
        } else if (status === 'connected') {
            btn.classList.add('connected');
            btn.innerHTML = '<i class="fa-solid fa-cloud-check"></i> Synced';
            btn.style.opacity = '1';
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.style.display = '';
                if (email) logoutBtn.title = 'Signed in as ' + email + ' — click to disconnect';
            }
        } else if (status === 'syncing') {
            btn.classList.add('syncing');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Syncing…';
            btn.style.opacity = '1';
        } else if (status === 'error') {
            btn.classList.add('error');
            btn.innerHTML = '<i class="fa-solid fa-cloud-exclamation"></i> Sync Error';
            btn.style.opacity = '1';
        }
    }

    function disconnectDrive() {
        if (!confirm("Disconnect Google Drive? Your local data stays safe. You can reconnect any account anytime.")) return;
        // Revoke the token with Google
        const token = gapi.client.getToken();
        if (token) {
            google.accounts.oauth2.revoke(token.access_token, () => {});
            gapi.client.setToken(null);
        }
        // Clear cached Drive file reference
        driveFileId = null;
        localStorage.removeItem('driveFileId');
        clearTimeout(autoSyncTimer);
        setSyncStatus('disconnected');
    }

    function gapiLoaded() {
        gapi.load('client', async () => {
            await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
            gapiInited = true;
            checkReady();
        });
    }

    function gsiLoaded() {
        gsiInited = true;
        checkReady();
    }

    function checkReady() {
        if (gapiInited && gsiInited) {
            setSyncStatus('disconnected');
            // If we already have a file ID cached, try a silent token refresh on load
            if (driveFileId) attemptSilentAuth();
        }
    }

    // Silent auth: no UI prompt, just tries to get a token in the background.
    // Will silently fail (no popup) if the user hasn't connected before.
    function attemptSilentAuth() {
        if (!gapiInited || !gsiInited) return;
        const tc = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            prompt: '',   // empty = no consent screen, silent only
            callback: async (resp) => {
                if (resp.error || !resp.access_token) return; // silent fail
                gapi.client.setToken(resp);
                // Silent re-auth on load: check Drive and download if needed
                await autoUpload(false);
            }
        });
        try { tc.requestAccessToken({ prompt: '' }); } catch(e) { /* silent */ }
    }

    // Called by the Sync button — prompts auth if not connected, does nothing if already connected
    function handleAuthClick() {
        if (!gapiInited || !gsiInited) {
            alert("Still loading Google libraries, please try again.");
            return;
        }
        // Already connected — sync btn should do nothing (logout btn handles disconnect)
        if (gapi.client.getToken()) return;

        const tc = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID, scope: SCOPES,
            callback: async (resp) => {
                if (resp.error) {
                    console.error("Auth Error:", resp);
                    setSyncStatus('error');
                    return;
                }
                gapi.client.setToken(resp);
                // Always check Drive first: if a file exists there, download it.
                // Only push local data if there is no file in Drive at all.
                await autoUpload();
            }
        });
        tc.requestAccessToken({ prompt: 'consent' });
    }

    // Debounced auto-sync: called after every data change.
    // delay=0 means immediate (used by manual button).
    function scheduleAutoSync(delay = 2000) {
        if (!gapi.client.getToken()) return; // not authenticated yet
        clearTimeout(autoSyncTimer);
        autoSyncTimer = setTimeout(() => autoUpload(true), delay);
    }

    // uploadOnly=true → skip the cloud-check and just push (used by auto-sync after changes)
    // uploadOnly=false/undefined → first look for an existing file in Drive, download if found, create if not
    async function autoUpload(uploadOnly) {
        if (isSyncing) return;
        if (!navigator.onLine) { setSyncStatus('error'); return; }
        isSyncing = true;
        setSyncStatus('syncing');
        try {
            if (uploadOnly) {
                // We already know the file exists — just push
                if (driveFileId) {
                    await updateFile(driveFileId, { categories, history, month: storedMonth });
                }
            } else {
                // First connection or silent re-auth: look for existing file in Drive
                const res = await gapi.client.drive.files.list({
                    spaces: 'appDataFolder', fields: 'files(id)', pageSize: 1
                });
                const files = res.result.files;
                if (files && files.length > 0) {
                    // File exists in Drive → download it (cloud is the source of truth)
                    driveFileId = files[0].id;
                    localStorage.setItem('driveFileId', driveFileId);
                    await downloadFile(driveFileId);
                    updateUI();
                } else {
                    // No file in Drive yet → upload local data
                    const created = await createFile({ categories, history, month: storedMonth });
                    driveFileId = created.id;
                    localStorage.setItem('driveFileId', driveFileId);
                }
            }
            // Fetch email for display
            try {
                const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
                    { headers: { Authorization: 'Bearer ' + gapi.client.getToken().access_token } });
                const profile = await info.json();
                setSyncStatus('connected', profile.email || '');
            } catch(e) { setSyncStatus('connected'); }
        } catch (err) {
            console.error("Auto-sync error:", err);
            setSyncStatus('error');
        } finally {
            isSyncing = false;
        }
    }

    async function createFile(data) {
        const token = gapi.client.getToken().access_token;
        const form  = new FormData();
        form.append('metadata', new Blob([JSON.stringify({ name: 'budget_frost_data.json', parents: ['appDataFolder'] })], { type: 'application/json' }));
        form.append('file',     new Blob([JSON.stringify(data)], { type: 'application/json' }));
        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
            { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: form });
        if (!res.ok) throw await res.json();
        return res.json();
    }

    async function updateFile(fileId, data) {
        const token = gapi.client.getToken().access_token;
        const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
            { method: 'PATCH', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (!res.ok) throw await res.json();
        return res.json();
    }

    async function downloadFile(fileId) {
        const response = await gapi.client.drive.files.get({ fileId, alt: 'media' });
        const cloudData = response.result;
        if (cloudData && cloudData.categories) {
            categories  = cloudData.categories;
            history     = cloudData.history || [];
            storedMonth = cloudData.month;
            localStorage.setItem('myCats',       JSON.stringify(categories));
            localStorage.setItem('history',      JSON.stringify(history));
            localStorage.setItem('currentMonth', storedMonth);
        }
    }

    // Re-auth when token expires (tokens last ~1 hour)
    setInterval(() => {
        if (gapi.client.getToken()) attemptSilentAuth();
    }, 45 * 60 * 1000);

    // Sync when coming back online
    window.addEventListener('online', () => {
        if (gapi.client.getToken()) scheduleAutoSync(1000);
    });

    // ── APP LOGIC ──
    function checkMonthReset() {
        const now = new Date().toISOString().slice(0, 7);
        if (!storedMonth) { storedMonth = now; localStorage.setItem('currentMonth', now); }
        else if (storedMonth !== now) {
            categories.forEach(c => c.balance = c.limit);
            storedMonth = now;
            localStorage.setItem('currentMonth', now);
            localStorage.setItem('myCats', JSON.stringify(categories));
        }
    }

    function updateUI() {
        localStorage.setItem('myCats',  JSON.stringify(categories));
        localStorage.setItem('history', JSON.stringify(history));

        const cardsEl = document.getElementById('cards-container');
        const selEl   = document.getElementById('catSelect');
        const editEl  = document.getElementById('editList');
        const histEl  = document.getElementById('historyList');
        cardsEl.innerHTML = selEl.innerHTML = editEl.innerHTML = '';

        categories.forEach(cat => {
            const p   = palettes[cat.pIndex % palettes.length];
            const pct = Math.max(0, Math.min(100, (cat.balance / cat.limit) * 100));
            cardsEl.innerHTML += `
                <div class="budget-card" style="background:linear-gradient(135deg,${p.grad[0]},${p.grad[1]})">
                    <div class="card-top"><span class="card-label">${cat.name}</span></div>
                    <div class="amount">₹${Math.max(0,cat.balance).toLocaleString('en-IN')}</div>
                    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
                </div>`;
            selEl.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            editEl.innerHTML += `
                <div class="cat-edit-row">
                    <input type="text" value="${cat.name}" disabled style="flex:1.5;opacity:0.6;border:none;background:transparent;">
                    <input type="number" id="limit_${cat.id}" value="${cat.limit}" style="flex:1;">
                    <button class="del-cat-btn" onclick="deleteCategory('${cat.id}')"><i class="fa-solid fa-xmark"></i></button>
                </div>`;
        });

        histEl.innerHTML = '<span class="sect-label">Recent Activity</span>';
        if (!history.length) {
            histEl.innerHTML += '<div class="empty-state">No transactions yet.</div>';
            return;
        }

        history.map((item, i) => ({ item, realIndex: i })).reverse().forEach(({ item, realIndex }) => {
            const cat     = categories.find(c => c.id === item.catId);
            const p       = cat ? palettes[cat.pIndex % palettes.length] : palettes[0];
            const catName = cat ? cat.name : 'Deleted';

            const wrapper = document.createElement('div');
            wrapper.className     = 'history-item-wrapper';
            wrapper.dataset.index = realIndex;
            wrapper.innerHTML = `
                <div class="delete-bg"><i class="fa-solid fa-trash-can"></i></div>
                <div class="history-item">
                    <div class="icon-circle" style="background:${p.base}22;color:${p.base}"><i class="fa-solid ${p.icon}"></i></div>
                    <div class="item-info">
                        <div class="item-name">${item.desc}</div>
                        <div class="item-meta"><span>${catName}</span><span>${item.date || ''}</span></div>
                    </div>
                    <div class="item-amt">-₹${item.val}</div>
                    <button class="delete-btn" title="Delete" onclick="requestDelete(${realIndex})">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>`;

            // Swipe to delete
            let startX = null;
            const hi = wrapper.querySelector('.history-item');
            const bg = wrapper.querySelector('.delete-bg');
            wrapper.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
            wrapper.addEventListener('touchmove',  e => {
                if (startX === null) return;
                const dx = e.touches[0].clientX - startX;
                if (dx < 0) { const s = Math.max(-68, dx); hi.style.transform = `translateX(${s}px)`; bg.style.opacity = Math.min(1, Math.abs(s) / 50); }
            }, { passive: true });
            wrapper.addEventListener('touchend', e => {
                if (startX === null) return;
                const dx = e.changedTouches[0].clientX - startX;
                hi.style.transform = ''; bg.style.opacity = 0;
                if (dx < -46) requestDelete(realIndex);
                startX = null;
            }, { passive: true });

            histEl.appendChild(wrapper);
        });
    }

    // ── DELETE TRANSACTION ──
    function requestDelete(idx) {
        const item = history[idx]; if (!item) return;
        pendingDeleteIndex = idx;
        const cat = categories.find(c => c.id === item.catId);
        document.getElementById('modalPreview').textContent =
            `"${item.desc}"  ·  ₹${item.val}  ·  ${cat ? cat.name : 'Deleted'}`;
        document.getElementById('deleteModal').classList.add('active');
    }
    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
        pendingDeleteIndex = null;
    }
    function confirmDelete() {
        if (pendingDeleteIndex === null) return;
        const item = history[pendingDeleteIndex];
        const ci = categories.findIndex(c => c.id === item.catId);
        if (ci > -1) categories[ci].balance += item.val;
        const wrapper = document.querySelector(`.history-item-wrapper[data-index="${pendingDeleteIndex}"]`);
        closeDeleteModal();
        if (wrapper) {
            wrapper.classList.add('removing');
            wrapper.addEventListener('animationend', () => {
                history.splice(pendingDeleteIndex, 1);
                pendingDeleteIndex = null;
                updateUI();
                scheduleAutoSync();
            }, { once: true });
        } else {
            history.splice(pendingDeleteIndex, 1);
            pendingDeleteIndex = null;
            updateUI();
            scheduleAutoSync();
        }
    }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });

    // ── OTHER ACTIONS ──
    function addEntry() {
        const desc  = document.getElementById('desc').value || 'Expense';
        const val   = parseFloat(document.getElementById('amt').value);
        const catId = document.getElementById('catSelect').value;
        if (!val || val <= 0) return;
        const idx = categories.findIndex(c => c.id === catId);
        if (idx > -1) categories[idx].balance -= val;
        const now = new Date();
        history.push({ desc, val, catId, date: `${now.toLocaleDateString([],{month:'short',day:'numeric'})}, ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}` });
        if (history.length > 50) history.shift();
        document.getElementById('desc').value = '';
        document.getElementById('amt').value  = '';
        updateUI();
        scheduleAutoSync();
    }

    function addNewCategory() {
        const name  = document.getElementById('newCatName').value;
        const limit = parseFloat(document.getElementById('newCatLimit').value);
        if (!name || !limit) return;
        categories.push({ id: 'cat_'+Date.now(), name, limit, balance: limit, pIndex: categories.length });
        document.getElementById('newCatName').value  = '';
        document.getElementById('newCatLimit').value = '';
        updateUI();
        scheduleAutoSync();
    }

    function saveLimits() {
        categories.forEach(cat => {
            const inp = document.getElementById('limit_'+cat.id);
            if (inp) { const v = parseFloat(inp.value); if (!isNaN(v) && v > 0) { cat.balance += (v - cat.limit); cat.limit = v; } }
        });
        updateUI();
        scheduleAutoSync();
        alert("Limits updated!");
    }

    function deleteCategory(id) {
        if (confirm("Delete this category? Its transactions will remain in history.")) {
            categories = categories.filter(c => c.id !== id);
            updateUI();
            scheduleAutoSync();
        }
    }

    function manualReset() {
        if (confirm("Force reset? This restores all balances to their limits and clears all transaction history.")) {
            categories.forEach(c => c.balance = c.limit);
            history = [];
            updateUI();
            scheduleAutoSync();
        }
    }

    function toggleSettings() {
        const a = document.getElementById('settings-area');
        a.style.display = a.style.display === 'block' ? 'none' : 'block';
    }

    function toggleDark() {
        document.body.classList.toggle('dark');
        localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    }

    window.onload = () => {
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
        checkMonthReset();
        updateUI();
        gapiLoaded();
        gsiLoaded();
    };
</script>

</body>
</html>
