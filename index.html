<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Frost</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-blur: blur(20px);
            --primary: #4f46e5; 
            --text-on-glass: #1e293b;
            --sub-text: #475569;
        }

        body.dark-mode {
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-on-glass: #f1f5f9;
            --sub-text: #94a3b8;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; 
            min-height: 100vh; color: var(--text-on-glass);
            transition: all 0.3s ease;
            background-color: #e2e8f0;
            background-image: linear-gradient(135deg, #f0f9ff 10%, #dbeafe 40%, #ddd6fe 80%, #f1f5f9 100%);
            background-attachment: fixed;
        }
        
        body.dark-mode {
            background-color: #0f172a;
            background-image: linear-gradient(135deg, #020617 10%, #1e293b 50%, #111827 90%, #020617 100%);
        }

        .container { 
            width: 100%; max-width: 420px; 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            padding: 24px; border-radius: 28px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.15);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h2 { margin: 0; font-size: 1.4rem; font-weight: 700; color: var(--primary); letter-spacing: -0.015em; }

        .dark-mode-toggle {
            background: none; border: 1px solid rgba(0,0,0,0.1); width: auto; padding: 8px 12px;
            color: var(--text-on-glass); border-radius: 12px; cursor: pointer; font-size: 0.9rem;
        }
        body.dark-mode .dark-mode-toggle { border-color: rgba(255,255,255,0.1); }

        /* Dynamic Cards */
        .budget-card {
            padding: 20px; border-radius: 22px; margin-bottom: 16px; color: #ffffff; 
            position: relative; overflow: hidden; box-shadow: 0 6px 20px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card-label { font-size: 0.85rem; font-weight: 600; opacity: 0.9; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .amount { font-size: 2.1rem; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.015em; }
        
        .progress-container { background: rgba(255, 255, 255, 0.2); height: 7px; border-radius: 10px; }
        .progress-bar { height: 100%; background: white; border-radius: 10px; transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Forms */
        .input-group { 
            background: rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; margin-bottom: 24px; 
            border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        body.dark-mode .input-group { background: rgba(0,0,0,0.1); }
        
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; color: var(--sub-text); }
        
        input, select { 
            width: 100%; padding: 13px; margin-bottom: 14px; border: 1px solid var(--glass-border);
            border-radius: 12px; font-family: inherit; font-size: 1rem;
            background: rgba(255,255,255,0.3); color: var(--text-on-glass); box-sizing: border-box; outline: none;
        }
        body.dark-mode input, body.dark-mode select { background: rgba(0,0,0,0.1); }
        input:focus, select:focus { border-color: var(--primary); }

        button.main-btn {
            background: var(--primary); color: white; border: none; padding: 15px; border-radius: 14px; 
            width: 100%; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform 0.1s;
            box-shadow: 0 4px 15px -1px rgba(79, 70, 229, 0.4); margin-bottom: 10px;
        }
        button.main-btn:active { transform: scale(0.97); }

        /* History Section with Scroll */
        .history { 
            margin-top: 24px; border-top: 1px solid var(--glass-border); 
            padding-top: 20px; max-height: 280px; overflow-y: auto; padding-right: 5px;
        }
        /* Scrollbar Styling */
        .history::-webkit-scrollbar { width: 5px; }
        .history::-webkit-scrollbar-track { background: transparent; }
        .history::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        body.dark-mode .history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

        .history-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        body.dark-mode .history-item { border-bottom-color: rgba(255,255,255,0.05); }
        .icon-circle { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 14px; flex-shrink: 0; }
        .item-info { flex: 1; min-width: 0; }
        .item-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-cat { font-size: 0.7rem; color: var(--sub-text); font-weight: 600; display: flex; justify-content: space-between; padding-right: 10px; }
        .item-date { font-weight: 400; opacity: 0.8; }
        .item-amt { font-weight: 700; color: #ef4444; font-size: 0.95rem; }

        /* Settings Area */
        .settings-btn {
            background: none; border: none; color: var(--sub-text); font-size: 0.75rem;
            margin-top: 24px; cursor: pointer; width: 100%; font-weight: 600;
        }
        #settings-area { display: none; padding-top: 15px; border-top: 1px dashed var(--glass-border); margin-top: 10px; }
        
        .cat-edit-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .cat-edit-row input { margin-bottom: 0; padding: 10px; font-size: 0.9rem; }
        .del-btn { background: #ef4444; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .divider { height: 1px; background: var(--glass-border); margin: 20px 0; }
        .reset-btn { background: rgba(0,0,0,0.05); color: var(--text-on-glass); box-shadow: none; }
        body.dark-mode .reset-btn { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fa-solid fa-wallet" style="color: var(--primary);"></i> Budget Frost</h2>
        <button class="dark-mode-toggle" onclick="toggleDark()"><i class="fa-solid fa-cloud-moon"></i></button>
    </div>

    <!-- Dynamic Cards render here -->
    <div id="cards-container"></div>

    <div class="input-group">
        <label>New Expense</label>
        <input type="text" id="desc" placeholder="What did you buy?">
        <input type="number" id="amt" placeholder="Amount (₹)" inputmode="decimal">
        <select id="catSelect"></select>
        <button class="main-btn" onclick="addEntry()"><i class="fa-solid fa-plus"></i> Record Transaction</button>
    </div>

    <div class="history" id="historyList"></div>

    <button class="settings-btn" onclick="toggleSettings()"><i class="fa-solid fa-gears"></i> MANAGE CATEGORIES & LIMITS</button>
    
    <div id="settings-area">
        <label>Edit Existing Limits</label>
        <div id="editList"></div>
        <button class="main-btn" style="background: #1e293b; box-shadow: none; padding: 12px; font-size: 0.9rem;" onclick="saveLimits()">Save Limit Changes</button>
        
        <div class="divider"></div>
        
        <label>Add New Category</label>
        <input type="text" id="newCatName" placeholder="Category Name (e.g. Travel)">
        <input type="number" id="newCatLimit" placeholder="Monthly Limit (₹)">
        <button class="main-btn" style="background: #10b981; box-shadow: none; padding: 12px; font-size: 0.9rem;" onclick="addNewCategory()">Create Category</button>

        <div class="divider"></div>
        <button class="main-btn reset-btn" onclick="manualReset()">Force Manual Reset</button>
    </div>
</div>

<script>
    const palettes = [
        { light: '#10b981ee', dark: '#059669', base: '#10b981', icon: 'fa-cart-shopping' }, 
        { light: '#f59e0bee', dark: '#d97706', base: '#f59e0b', icon: 'fa-star' },          
        { light: '#6366f1ee', dark: '#4f46e5', base: '#6366f1', icon: 'fa-bolt' },          
        { light: '#ec4899ee', dark: '#db2777', base: '#ec4899', icon: 'fa-heart' },         
        { light: '#06b6d4ee', dark: '#0891b2', base: '#06b6d4', icon: 'fa-plane' }          
    ];

    let defaultCats = [
        { id: 'needs', name: 'Daily Needs', limit: 6000, balance: 6000, pIndex: 0 },
        { id: 'wants', name: 'Wants', limit: 7150, balance: 7150, pIndex: 1 }
    ];

    let categories = JSON.parse(localStorage.getItem('myCats')) || defaultCats;
    let history = JSON.parse(localStorage.getItem('history')) || [];
    let storedMonth = localStorage.getItem('currentMonth');

    // Auto-Reset Check
    function checkMonthReset() {
        const currentRealMonth = new Date().toISOString().slice(0, 7); // Format: "YYYY-MM"
        
        if (!storedMonth) {
            // First time loading the app
            storedMonth = currentRealMonth;
            localStorage.setItem('currentMonth', storedMonth);
        } else if (storedMonth !== currentRealMonth) {
            // A new month has started! Reset balances, but keep history.
            categories.forEach(cat => cat.balance = cat.limit);
            storedMonth = currentRealMonth;
            localStorage.setItem('currentMonth', storedMonth);
            // Save immediately
            localStorage.setItem('myCats', JSON.stringify(categories));
        }
    }

    function updateUI() {
        localStorage.setItem('myCats', JSON.stringify(categories));
        localStorage.setItem('history', JSON.stringify(history));

        const cardsContainer = document.getElementById('cards-container');
        const selectBox = document.getElementById('catSelect');
        const editList = document.getElementById('editList');
        const historyList = document.getElementById('historyList');

        cardsContainer.innerHTML = '';
        selectBox.innerHTML = '';
        editList.innerHTML = '';

        categories.forEach(cat => {
            const p = palettes[cat.pIndex % palettes.length];
            const percent = Math.min(100, Math.max(0, (cat.balance / cat.limit) * 100));

            cardsContainer.innerHTML += `
                <div class="budget-card" style="background: linear-gradient(135deg, ${p.light}, ${p.dark})">
                    <div class="card-label"><span>${cat.name} Remaining</span> <i class="fa-solid ${p.icon}"></i></div>
                    <div class="amount">₹${Math.max(0, cat.balance).toLocaleString()}</div>
                    <div class="progress-container"><div class="progress-bar" style="width: ${percent}%"></div></div>
                </div>`;

            selectBox.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;

            editList.innerHTML += `
                <div class="cat-edit-row">
                    <input type="text" value="${cat.name}" disabled style="flex:1.5; background:transparent; border:none; opacity:0.8;">
                    <input type="number" id="limit_${cat.id}" value="${cat.limit}" style="flex:1;">
                    <button class="del-btn" onclick="deleteCategory('${cat.id}')"><i class="fa-solid fa-xmark"></i></button>
                </div>`;
        });

        historyList.innerHTML = '<label>Recent Activity</label>';
        if(history.length === 0) historyList.innerHTML += '<div style="font-size:0.8rem; opacity:0.6;">No recent transactions.</div>';
        
        history.slice().reverse().forEach(item => {
            const cat = categories.find(c => c.id === item.catId);
            const p = cat ? palettes[cat.pIndex % palettes.length] : palettes[0];
            const catName = cat ? cat.name : "Deleted";
            const dateStr = item.date || "Unknown Date";

            historyList.innerHTML += `
                <div class="history-item">
                    <div class="icon-circle" style="background: ${p.base}20; color: ${p.base}"><i class="fa-solid ${p.icon}"></i></div>
                    <div class="item-info">
                        <div class="item-name">${item.desc}</div>
                        <div class="item-cat">
                            <span>${catName.toUpperCase()}</span>
                            <span class="item-date">${dateStr}</span>
                        </div>
                    </div>
                    <div class="item-amt">-₹${item.val}</div>
                </div>`;
        });
    }

    function addEntry() {
        const desc = document.getElementById('desc').value || "Expense";
        const val = parseFloat(document.getElementById('amt').value);
        const catId = document.getElementById('catSelect').value;

        if (isNaN(val) || val <= 0 || !catId) return;

        let catIndex = categories.findIndex(c => c.id === catId);
        if(catIndex > -1) {
            categories[catIndex].balance -= val;
        }

        // Generate clean date string (e.g., "Oct 24, 2:30 PM")
        const now = new Date();
        const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const dateString = now.toLocaleDateString([], {month: 'short', day: 'numeric'});
        const fullDate = `${dateString}, ${timeString}`;

        history.push({ desc: desc, val: val, catId: catId, date: fullDate });
        
        // Keep up to 50 transactions in history so previous month is visible
        if (history.length > 50) history.shift(); 

        document.getElementById('desc').value = '';
        document.getElementById('amt').value = '';
        updateUI();
    }

    function addNewCategory() {
        const name = document.getElementById('newCatName').value.trim();
        const limit = parseFloat(document.getElementById('newCatLimit').value);
        
        if (!name || isNaN(limit) || limit <= 0) {
            alert("Please provide a valid name and limit.");
            return;
        }

        const newId = 'cat_' + Date.now();
        const pIndex = categories.length; 

        categories.push({ id: newId, name: name, limit: limit, balance: limit, pIndex: pIndex });
        
        document.getElementById('newCatName').value = '';
        document.getElementById('newCatLimit').value = '';
        updateUI();
    }

    function saveLimits() {
        categories.forEach(cat => {
            const input = document.getElementById('limit_' + cat.id);
            if (input) {
                const newLimit = parseFloat(input.value);
                if (!isNaN(newLimit) && newLimit > 0) {
                    const diff = newLimit - cat.limit;
                    cat.limit = newLimit;
                    cat.balance += diff;
                }
            }
        });
        updateUI();
        alert("Limits updated successfully!");
    }

    function deleteCategory(id) {
        if(confirm("Are you sure you want to delete this category?")) {
            categories = categories.filter(c => c.id !== id);
            updateUI();
        }
    }

    function manualReset() {
        if(confirm("Force a manual reset? This resets balances to max and wipes all history.")) {
            categories.forEach(cat => cat.balance = cat.limit);
            history = [];
            updateUI();
        }
    }

    function toggleSettings() {
        const area = document.getElementById('settings-area');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }

    function toggleDark() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('dark', document.body.classList.contains('dark-mode'));
    }

    // Initialize App
    if(localStorage.getItem('dark') === 'true') document.body.classList.add('dark-mode');
    checkMonthReset(); // Check if it's a new month first
    updateUI();        // Then build the UI
</script>

</body>
</html>
